name: selaphim
description: AI Vision & Voice Assistant – daily life monitor and assistant powered by OpenAI, Google Gemini, or Anthropic Claude.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1

  # State management
  provider: ^6.1.2

  # Camera & media
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0

  # Speech
  speech_to_text: ^6.6.2
  flutter_tts: ^4.0.2

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Storage
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  share_plus: ^10.0.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
